<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalDrop Desktop v1.1.9</title>
    <style>
        :root { --bg: #0d1117; --top-bar: #161b22; --card: #1c2128; --primary: #58a6ff; --text: #c9d1d9; --border: #30363d; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* macOS Traffic Lights */
        .title-bar { height: 38px; background: var(--top-bar); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); -webkit-app-region: drag; }
        .window-controls { display: flex; gap: 8px; -webkit-app-region: no-drag; }
        .dot { width: 12px; height: 12px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; cursor: pointer; }
        .close { background: #ff5f56; } .minimize { background: #ffbd2e; } .maximize { background: #27c93f; }
        .dot span { display: none; color: rgba(0,0,0,0.5); }
        .window-controls:hover .dot span { display: inline-block; }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #qrcode { background: white; padding: 10px; border-radius: 8px; margin: 15px auto; display: inline-block; }
        .id-box { font-family: monospace; background: #0d1117; padding: 10px; border-radius: 8px; color: var(--primary); border: 1px solid var(--border); margin-bottom: 15px; }
        
        /* Two-Way Send Section */
        .send-to-mobile { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .btn-send { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-alt { background: #30363d; }
        .muted { font-size: 12px; color: #8b949e; }
        .hidden { display: none; }
        #btDeviceList {
            width: 100%;
            margin-top: 10px;
            background: #0d1117;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
        }
        #btDeviceMeta {
            margin-top: 8px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            text-align: left;
            font-size: 11px;
            line-height: 1.4;
            color: #8b949e;
            white-space: pre-wrap;
        }
        
        #update-bar { position: fixed; bottom: 0; width: 100%; background: var(--primary); color: white; padding: 10px; text-align: center; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="title-bar">
        <div class="window-controls">
            <div class="dot close" onclick="ipcRenderer.send('close')"><span>✕</span></div>
            <div class="dot minimize" onclick="ipcRenderer.send('min')"><span>−</span></div>
            <div class="dot maximize" onclick="ipcRenderer.send('max')"><span>＋</span></div>
        </div>
        <div style="flex-grow:1; text-align:center; font-size:12px; color:#8b949e;">LocalDrop — v1.1.9</div>
    </div>

    <div class="main-content">
        <div class="card">
            <h1>LocalDrop PC</h1>
            <div id="qrcode"></div>
            <div class="id-box" id="peer-id">Connecting...</div>
            
            <div class="send-to-mobile">
                <p class="muted">Send file to connected phone:</p>
                <input type="file" id="pcFile" style="font-size: 10px;">
                <button class="btn-send" onclick="sendToMobile()">Send to Mobile</button>
                <button class="btn-send btn-alt" onclick="openBluetoothReceive()">Receive via Bluetooth</button>
                <div style="margin-top: 12px; text-align: left;">
                    <label class="muted"><input type="checkbox" id="bluetoothMode"> Bluetooth mode</label>
                </div>
                <div id="bluetoothPanel" class="hidden">
                    <select id="btDeviceList"></select>
                    <div id="btDeviceMeta">No device selected.</div>
                    <button class="btn-send btn-alt" onclick="refreshBluetoothDevices()">Refresh Paired Devices</button>
                    <button class="btn-send btn-alt" onclick="sendViaBluetoothSelected()">Send via Bluetooth (Direct First)</button>
                    <p id="btStatus" class="muted" style="margin-top: 8px;">Bluetooth mode is enabled.</p>
                </div>
            </div>

            <div style="margin-top: 15px; text-align: left;">
                <label style="font-size: 12px;"><input type="checkbox" id="safeMode" checked> Safe Mode</label>
            </div>
        </div>
    </div>

    <div id="update-bar">Update Ready (v1.1.9) <button onclick="ipcRenderer.send('restart_app')">Install</button></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const { ipcRenderer } = require('electron');
        const MY_ID = 'localdrop-pc-250';
        const peer = new Peer(MY_ID);
        let activeMobileConn = null;
        const btModeCheckbox = document.getElementById('bluetoothMode');
        const btPanel = document.getElementById('bluetoothPanel');
        const btDeviceList = document.getElementById('btDeviceList');
        const btDeviceMeta = document.getElementById('btDeviceMeta');
        const btStatus = document.getElementById('btStatus');
        let btDevices = [];
        let btRefreshTimer = null;
        let btRefreshInFlight = false;

        peer.on('open', (id) => {
            document.getElementById('peer-id').innerText = id;
            new QRCode(document.getElementById("qrcode"), {
                text: `https://localdrop-share.vercel.app?target=${id}`,
                width: 140, height: 140
            });
        });

        peer.on('connection', (conn) => {
            activeMobileConn = conn; // Save the connection for two-way sending
            conn.on('data', (data) => {
                if (document.getElementById('safeMode').checked) {
                    if (confirm(`Accept file from phone: ${data.name}?`)) saveFile(data);
                } else { saveFile(data); }
            });
        });

        function sendToMobile() {
            const file = document.getElementById('pcFile').files[0];
            if (!activeMobileConn) return alert("No phone connected! Scan the QR first.");
            if (!file) return alert("Select a file on PC first.");
            
            const reader = new FileReader();
            reader.onload = (e) => {
                activeMobileConn.send({ file: e.target.result, name: file.name, type: file.type });
                alert("Sent to phone!");
            };
            reader.readAsArrayBuffer(file);
        }

        async function openBluetoothReceive() {
            const result = await ipcRenderer.invoke('open_bluetooth_wizard', 'receive');
            if (!result.ok) {
                alert(result.message || "Could not open Bluetooth receive dialog.");
            }
        }

        async function refreshBluetoothDevices() {
            if (btRefreshInFlight) return;
            btRefreshInFlight = true;
            try {
                const previouslySelectedId = btDevices[Number(btDeviceList.value)]?.id || null;
                btStatus.innerText = "Scanning paired Bluetooth devices...";
                btDeviceList.innerHTML = '';
                btDeviceMeta.innerText = 'No device selected.';
                const result = await ipcRenderer.invoke('list_bluetooth_devices');
                if (!result.ok) {
                    btStatus.innerText = result.message || 'Failed to list Bluetooth devices.';
                    return;
                }
                btDevices = result.devices || [];
                if (!btDevices.length) {
                    btStatus.innerText = 'No paired Bluetooth devices found.';
                    const opt = document.createElement('option');
                    opt.value = '';
                    opt.innerText = 'No paired devices';
                    btDeviceList.appendChild(opt);
                    return;
                }
                let selectedIndex = 0;
                btDevices.forEach((device, idx) => {
                    const opt = document.createElement('option');
                    opt.value = String(idx);
                    const connected = device.isConnected ? 'Connected' : 'Not connected';
                    opt.innerText = `${device.name} (${connected})`;
                    btDeviceList.appendChild(opt);
                    if (previouslySelectedId && device.id === previouslySelectedId) selectedIndex = idx;
                });
                btDeviceList.value = String(selectedIndex);
                btStatus.innerText = `Found ${btDevices.length} paired Bluetooth device(s).`;
                renderBluetoothDeviceMeta(selectedIndex);
            } finally {
                btRefreshInFlight = false;
            }
        }

        function renderBluetoothDeviceMeta(index) {
            const device = btDevices[index];
            if (!device) {
                btDeviceMeta.innerText = 'No device selected.';
                return;
            }
            btDeviceMeta.innerText =
`Name: ${device.name}
Connected: ${device.isConnected ? 'Yes' : 'No'}
Paired: ${device.isPaired ? 'Yes' : 'No'}
Can Pair: ${device.canPair ? 'Yes' : 'No'}
Pairing Protection: ${device.pairingProtection || 'Unknown'}
Container Id: ${device.containerId || 'N/A'}`;
        }

        async function sendViaBluetoothSelected() {
            const file = document.getElementById('pcFile').files[0];
            if (!file) return alert("Select a file on PC first.");
            if (!file.path) return alert("Could not read local file path for Bluetooth transfer.");
            const selectedIndex = Number(btDeviceList.value);
            const selected = btDevices[selectedIndex];
            if (!selected) return alert("Select a Bluetooth device first.");

            btStatus.innerText = 'Trying direct Bluetooth OBEX-style send...';
            const result = await ipcRenderer.invoke('send_file_bluetooth', {
                filePath: file.path,
                deviceName: selected.name,
                deviceId: selected.id
            });

            if (!result.ok) {
                const details = Array.isArray(result.details) ? `\n${result.details.join('\n')}` : '';
                btStatus.innerText = (result.message || 'Bluetooth send failed.') + details;
                alert(btStatus.innerText);
                return;
            }

            if (result.used === 'direct') {
                const details = Array.isArray(result.details) && result.details.length ? ` ${result.details.join(' | ')}` : '';
                btStatus.innerText = `Direct Bluetooth send attempt started.${details}`;
            } else {
                const details = Array.isArray(result.details) ? `\n${result.details.join('\n')}` : '';
                btStatus.innerText = (result.message || 'Opened Bluetooth wizard fallback.') + details;
                alert(btStatus.innerText);
            }
        }

        btDeviceList.addEventListener('change', (e) => {
            const idx = Number(e.target.value);
            renderBluetoothDeviceMeta(idx);
        });

        btModeCheckbox.addEventListener('change', async (e) => {
            const enabled = e.target.checked;
            btPanel.classList.toggle('hidden', !enabled);
            if (enabled) {
                await refreshBluetoothDevices();
                if (btRefreshTimer) clearInterval(btRefreshTimer);
                btRefreshTimer = setInterval(() => {
                    refreshBluetoothDevices();
                }, 5000);
            } else {
                btStatus.innerText = 'Bluetooth mode is disabled.';
                if (btRefreshTimer) {
                    clearInterval(btRefreshTimer);
                    btRefreshTimer = null;
                }
            }
        });

        window.addEventListener('beforeunload', () => {
            if (btRefreshTimer) {
                clearInterval(btRefreshTimer);
                btRefreshTimer = null;
            }
        });

        function saveFile(data) {
            const blob = new Blob([data.file], { type: data.type });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = data.name;
            link.click();
        }

        ipcRenderer.on('update_available', () => { document.getElementById('update-bar').style.display = 'block'; });
    </script>
</body>
</html>
