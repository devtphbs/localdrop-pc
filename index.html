<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalDrop Desktop v1.1.9</title>
    <style>
        :root { --bg: #0d1117; --top-bar: #161b22; --card: #1c2128; --primary: #58a6ff; --text: #c9d1d9; --border: #30363d; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* macOS Traffic Lights */
        .title-bar { height: 38px; background: var(--top-bar); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); -webkit-app-region: drag; }
        .window-controls { display: flex; gap: 8px; -webkit-app-region: no-drag; }
        .dot { width: 12px; height: 12px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; cursor: pointer; }
        .close { background: #ff5f56; } .minimize { background: #ffbd2e; } .maximize { background: #27c93f; }
        .dot span { display: none; color: rgba(0,0,0,0.5); }
        .window-controls:hover .dot span { display: inline-block; }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #qrcode { background: white; padding: 10px; border-radius: 8px; margin: 15px auto; display: inline-block; }
        .id-box { font-family: monospace; background: #0d1117; padding: 10px; border-radius: 8px; color: var(--primary); border: 1px solid var(--border); margin-bottom: 15px; }
        
        /* Two-Way Send Section */
        .send-to-mobile { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .btn-send { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        #update-bar { position: fixed; bottom: 0; width: 100%; background: var(--primary); color: white; padding: 10px; text-align: center; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="title-bar">
        <div class="window-controls">
            <div class="dot close" onclick="ipcRenderer.send('close')"><span>✕</span></div>
            <div class="dot minimize" onclick="ipcRenderer.send('min')"><span>−</span></div>
            <div class="dot maximize" onclick="ipcRenderer.send('max')"><span>＋</span></div>
        </div>
        <div style="flex-grow:1; text-align:center; font-size:12px; color:#8b949e;">LocalDrop — v1.1.9</div>
    </div>

    <div class="main-content">
        <div class="card">
            <h1>LocalDrop PC</h1>
            <div id="qrcode"></div>
            <div class="id-box" id="peer-id">Connecting...</div>
            
            <div class="send-to-mobile">
                <p style="font-size: 12px; color: #8b949e;">Send file to connected phone:</p>
                <input type="file" id="pcFile" style="font-size: 10px;">
                <button class="btn-send" onclick="sendToMobile()">Send to Mobile</button>
            </div>

            <div style="margin-top: 15px; text-align: left;">
                <label style="font-size: 12px;"><input type="checkbox" id="safeMode" checked> Safe Mode</label>
            </div>
        </div>
    </div>

    <div id="update-bar">Update Ready (v1.1.9) <button onclick="ipcRenderer.send('restart_app')">Install</button></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const { ipcRenderer } = require('electron');
        const MY_ID = 'localdrop-pc-250';
        const peer = new Peer(MY_ID);
        let activeMobileConn = null;

        peer.on('open', (id) => {
            document.getElementById('peer-id').innerText = id;
            new QRCode(document.getElementById("qrcode"), {
                text: `https://localdrop-share.vercel.app?target=${id}`,
                width: 140, height: 140
            });
        });

        peer.on('connection', (conn) => {
            activeMobileConn = conn; // Save the connection for two-way sending
            conn.on('data', (data) => {
                if (document.getElementById('safeMode').checked) {
                    if (confirm(`Accept file from phone: ${data.name}?`)) saveFile(data);
                } else { saveFile(data); }
            });
        });

        function sendToMobile() {
            const file = document.getElementById('pcFile').files[0];
            if (!activeMobileConn) return alert("No phone connected! Scan the QR first.");
            if (!file) return alert("Select a file on PC first.");
            
            const reader = new FileReader();
            reader.onload = (e) => {
                activeMobileConn.send({ file: e.target.result, name: file.name, type: file.type });
                alert("Sent to phone!");
            };
            reader.readAsArrayBuffer(file);
        }

        function saveFile(data) {
            const blob = new Blob([data.file], { type: data.type });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = data.name;
            link.click();
        }

        ipcRenderer.on('update_available', () => { document.getElementById('update-bar').style.display = 'block'; });
    </script>
</body>
</html>
