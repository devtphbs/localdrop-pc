<!DOCTYPE html>
<html>
<head>
    <title>LocalDrop Desktop</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; }
        .update-notify { display: none; position: fixed; bottom: 20px; right: 20px; background: #333; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        .safe-mode-info { font-size: 0.8em; color: #888; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
        button { cursor: pointer; padding: 10px; margin: 10px; border-radius: 5px; border: none; background: #007bff; color: white; }
    </style>
</head>
<body>
    <h1>LocalDrop PC</h1>
    <div id="peer-id">Loading ID...</div>
    
    <div style="margin: 20px; padding: 15px; border: 1px solid #333;">
        <label>
            <input type="checkbox" id="safeMode"> Enable Safe Mode
        </label>
        <div class="safe-mode-info">
            <strong>What is Safe Mode?</strong><br>
            Shields your transfer with end-to-end encryption and forces you to manually "Accept" files before they save to your computer.
        </div>
    </div>

    <div id="notification" class="update-notify">
        <p id="message"></p>
        <button id="restart-button" style="display:none" onclick="restartApp()">Restart & Update</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const { ipcRenderer } = require('electron');
        const peer = new Peer('localdrop-pc-' + Math.floor(Math.random() * 10000));

        peer.on('open', (id) => {
            document.getElementById('peer-id').innerText = "Your PC ID: " + id;
        });

        // Receiving File Logic
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                const isSafe = document.getElementById('safeMode').checked;
                
                if (isSafe) {
                    if (confirm(`Accept file: ${data.name} (${data.size} bytes)?`)) {
                        saveFile(data);
                    }
                } else {
                    saveFile(data);
                }
            });
        });

        function saveFile(data) {
            const blob = new Blob([data.file], { type: data.type });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = data.name;
            a.click();
        }

        // Auto-Update UI Handlers
        ipcRenderer.on('update_available', () => {
            document.getElementById('notification').style.display = 'block';
            document.getElementById('message').innerText = 'New update found. Downloading...';
        });

        ipcRenderer.on('update_downloaded', () => {
            document.getElementById('message').innerText = 'Update ready!';
            document.getElementById('restart-button').style.display = 'block';
        });

        function restartApp() {
            ipcRenderer.send('restart_app');
        }
    </script>
</body>
</html>
