<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalDrop Desktop</title>
    <style>
        :root {
            --bg: #0d1117;
            --top-bar: #161b22;
            --card: #1c2128;
            --primary: #58a6ff;
            --text: #c9d1d9;
            --border: #30363d;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- macOS Style Top Bar --- */
        .title-bar {
            height: 38px;
            background: var(--top-bar);
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
        }
        .window-controls {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: bold;
            color: rgba(0,0,0,0.5);
            cursor: pointer;
            text-decoration: none;
            border: 0.5px solid rgba(0,0,0,0.1);
        }
        .dot:hover color { color: rgba(0,0,0,0.8); }
        .close { background: #ff5f56; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #27c93f; }
        
        /* Icons show on hover */
        .dot span { display: none; }
        .window-controls:hover .dot span { display: inline-block; }

        .app-title {
            margin-left: 15px;
            font-size: 12px;
            color: #8b949e;
            flex-grow: 1;
            text-align: center;
            margin-right: 50px; /* offset for symmetry */
        }

        /* --- Main UI --- */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-size: 2.2rem; margin: 0; color: #fff; }
        #qrcode {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 20px auto;
            display: inline-block;
        }
        .id-box {
            font-family: monospace;
            background: #0d1117;
            padding: 12px;
            border-radius: 8px;
            color: var(--primary);
            font-size: 1.2rem;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .safe-mode-area {
            text-align: left;
            border-top: 1px solid var(--border);
            padding-top: 20px;
            margin-top: 20px;
        }
        input[type="checkbox"] { accent-color: #3fb950; width: 18px; height: 18px; }

        /* Update Notification */
        #update-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 12px;
            text-align: center;
            display: none;
            font-weight: bold;
        }
        #update-bar button {
            background: white;
            color: var(--primary);
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            margin-left: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="title-bar">
        <div class="window-controls">
            <div class="dot close" onclick="ipcRenderer.send('close')"><span>✕</span></div>
            <div class="dot minimize" onclick="ipcRenderer.send('min')"><span>−</span></div>
            <div class="dot maximize" onclick="ipcRenderer.send('max')"><span>＋</span></div>
        </div>
        <div class="app-title">LocalDrop PC — v1.1.7</div>
    </div>

    <div class="main-content">
        <div class="card">
            <h1>LocalDrop PC</h1>
            <p style="color: #8b949e;">Scan to connect instantly</p>
            
            <div id="qrcode"></div>

            <div class="id-box" id="peer-id">Connecting...</div>

            <div class="safe-mode-area">
                <label style="display: flex; align-items: center; gap: 10px; font-weight: bold;">
                    <input type="checkbox" id="safeMode" checked> Enable Safe Mode
                </label>
            </div>
        </div>
    </div>

    <div id="update-bar">
        Update Ready! <button onclick="ipcRenderer.send('restart_app')">Update Now</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const { ipcRenderer } = require('electron');
        const MY_ID = 'localdrop-pc-250';
        const peer = new Peer(MY_ID); 

        peer.on('open', (id) => {
            document.getElementById('peer-id').innerText = id;
            
            // AUTO-CONNECT LOGIC: Passes the ID in the URL
            new QRCode(document.getElementById("qrcode"), {
                text: `https://localdrop-share.vercel.app?target=${id}`, 
                width: 160, height: 160
            });
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (document.getElementById('safeMode').checked) {
                    if (confirm(`Accept file: ${data.name}?`)) saveFile(data);
                } else {
                    saveFile(data);
                }
            });
        });

        function saveFile(data) {
            const blob = new Blob([data.file], { type: data.type });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = data.name;
            link.click();
        }

        ipcRenderer.on('update_available', () => {
            document.getElementById('update-bar').style.display = 'block';
        });
    </script>
</body>
</html>
